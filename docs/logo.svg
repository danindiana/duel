<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200" width="640" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="actorGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00c8ff"/>
      <stop offset="100%" style="stop-color:#0066aa"/>
    </linearGradient>
    <linearGradient id="criticGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffb700"/>
      <stop offset="100%" style="stop-color:#ff6600"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="640" height="200" fill="url(#bg)" rx="12"/>
  <rect width="640" height="200" fill="none" stroke="#333" stroke-width="1.5" rx="12"/>

  <!-- Decorative grid lines -->
  <g opacity="0.06" stroke="#00ff88" stroke-width="0.5">
    <line x1="0" y1="40" x2="640" y2="40"/>
    <line x1="0" y1="80" x2="640" y2="80"/>
    <line x1="0" y1="120" x2="640" y2="120"/>
    <line x1="0" y1="160" x2="640" y2="160"/>
    <line x1="160" y1="0" x2="160" y2="200"/>
    <line x1="320" y1="0" x2="320" y2="200"/>
    <line x1="480" y1="0" x2="480" y2="200"/>
  </g>

  <!-- Left sword (Actor - cyan) -->
  <g transform="translate(220,100) rotate(-35)" filter="url(#glow)">
    <!-- blade -->
    <rect x="-6" y="-70" width="5" height="80" fill="url(#actorGrad)" rx="2"/>
    <!-- tip -->
    <polygon points="-6,-70 -1,-70 -3.5,-85" fill="#00c8ff"/>
    <!-- guard -->
    <rect x="-18" y="10" width="30" height="5" fill="#00aacc" rx="2"/>
    <!-- grip -->
    <rect x="-5" y="15" width="3" height="22" fill="#334455" rx="1"/>
    <!-- pommel -->
    <circle cx="-3.5" cy="38" r="4" fill="#00aacc"/>
  </g>

  <!-- Right sword (Critic - gold) -->
  <g transform="translate(420,100) rotate(215)" filter="url(#glow)">
    <!-- blade -->
    <rect x="-6" y="-70" width="5" height="80" fill="url(#criticGrad)" rx="2"/>
    <!-- tip -->
    <polygon points="-6,-70 -1,-70 -3.5,-85" fill="#ffb700"/>
    <!-- guard -->
    <rect x="-18" y="10" width="30" height="5" fill="#cc8800" rx="2"/>
    <!-- grip -->
    <rect x="-5" y="15" width="3" height="22" fill="#443322" rx="1"/>
    <!-- pommel -->
    <circle cx="-3.5" cy="38" r="4" fill="#cc8800"/>
  </g>

  <!-- Clash spark at center -->
  <g transform="translate(320,100)" filter="url(#softglow)">
    <circle cx="0" cy="0" r="8" fill="#ffffff" opacity="0.9"/>
    <circle cx="0" cy="0" r="14" fill="#ffff88" opacity="0.4"/>
    <!-- spark rays -->
    <g stroke="#ffffff" stroke-width="1.5" opacity="0.7">
      <line x1="0" y1="-18" x2="0" y2="-28"/>
      <line x1="0" y1="18" x2="0" y2="28"/>
      <line x1="-18" y1="0" x2="-28" y2="0"/>
      <line x1="18" y1="0" x2="28" y2="0"/>
      <line x1="-13" y1="-13" x2="-20" y2="-20"/>
      <line x1="13" y1="-13" x2="20" y2="-20"/>
      <line x1="-13" y1="13" x2="-20" y2="20"/>
      <line x1="13" y1="13" x2="20" y2="20"/>
    </g>
  </g>

  <!-- DUEL title -->
  <text x="320" y="155" font-family="'Courier New', monospace" font-size="42" font-weight="bold"
        text-anchor="middle" fill="#ffffff" filter="url(#glow)" letter-spacing="12">DUEL</text>

  <!-- Subtitle -->
  <text x="320" y="178" font-family="'Courier New', monospace" font-size="13"
        text-anchor="middle" fill="#888888" letter-spacing="3">actor · critic · ∞</text>

  <!-- Actor label -->
  <text x="175" y="38" font-family="'Courier New', monospace" font-size="11"
        text-anchor="middle" fill="#00c8ff" opacity="0.8">ACTOR</text>

  <!-- Critic label -->
  <text x="465" y="38" font-family="'Courier New', monospace" font-size="11"
        text-anchor="middle" fill="#ffb700" opacity="0.8">CRITIC</text>
</svg>
